# Defaults for binoc-sqlite test vectors. Per-vector manifest.toml overrides.
# SQLite DBs are built from .sqlite.d / .db.d dirs (SQL files run in order).

[config]
comparators = [
    "binoc.zip",
    "binoc.directory",
    "binoc-sqlite.sqlite",
    "binoc.csv",
    "binoc.text",
    "binoc.binary",
]
transformers = ["binoc.move_detector", "binoc.copy_detector", "binoc.column_reorder_detector"]
